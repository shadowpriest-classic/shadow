name: Update Benchmark Data

on:
  # Run every Wednesday at 3:00 AM CET (2:00 AM UTC)
  schedule:
    - cron: '0 2 * * 3'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-benchmarks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run benchmark scraper
        run: |
          cd tools
          node benchmark-scraper.js --auto
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
          NODE_ENV: production

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        run: |
          git pull --rebase origin main
          git add analyzer/benchmarks/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update benchmark data (automated)"
            git push
          fi
